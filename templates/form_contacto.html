{% extends "base.html" %}
{% block title %}{{ 'Editar' if c else 'Nuevo' }} Contacto - CRM{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{{ 'Editar' if c else 'Nuevo' }} Contacto</h1>
<form method="post" class="max-w-2xl space-y-4">
  <div>
    <label class="block text-sm text-gray-400 mb-1">Nombre *</label>
    <input type="text" name="nombre" value="{{ c.nombre if c else '' }}" required
           class="w-full bg-gray-800 border border-gray-700 rounded px-4 py-2 focus:border-blue-500 outline-none">
  </div>
  <div>
    <label class="block text-sm text-gray-400 mb-1">Valor ($)</label>
    <input type="number" name="valor" step="0.01" value="{{ c.valor if c else '0' }}"
           class="w-full bg-gray-800 border border-gray-700 rounded px-4 py-2 outline-none">
  </div>
  <div>
    <label class="block text-sm text-gray-400 mb-2">Pago por día de la semana</label>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      {% for dia in DIAS %}
      <div class="flex items-center gap-2">
        <label class="text-sm w-24">{{ dia }}</label>
        <select name="{{ dia }}" class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm outline-none">
          {% for pg in PAGOS %}
          <option value="{{ pg }}" {{ 'selected' if c and c[dia] == pg else '' }}>{{ pg }}</option>
          {% endfor %}
        </select>
      </div>
      {% endfor %}
    </div>
  </div>
  <div>
    <label class="block text-sm text-gray-400 mb-1">Notas</label>
    <textarea name="notas" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded px-4 py-2 outline-none">{{ c.notas if c else '' }}</textarea>
  </div>
  <div class="flex gap-2">
    <button type="submit" class="bg-blue-600 px-6 py-2 rounded hover:bg-blue-500">Guardar</button>
    <a href="{{ url_for('contactos') }}" class="bg-gray-700 px-6 py-2 rounded hover:bg-gray-600">Cancelar</a>
  </div>
</form>
{% endblock %}
