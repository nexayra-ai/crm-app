<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes - CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111827; color: #e5e7eb; font-family: 'Segoe UI', system-ui, sans-serif; }
    .card { background: #1f2937; border-radius: 8px; border: 1px solid #374151; }
    table { border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #374151; padding: 4px 10px; }
    th { background: #374151; color: #9ca3af; }
    .btn { background: #2563eb; color: white; border: none; border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #1d4ed8; }
    .btn.secondary { background: #374151; }
    .btn.secondary:hover { background: #4b5563; }
  </style>
</head>
<body class="p-6">

<div class="flex justify-between items-center mb-6">
  <div class="flex items-center gap-4">
    <h1 class="text-xl font-bold">📊 Reportes</h1>
    <a href="/" class="btn secondary">← Volver a planilla</a>
  </div>
  <div class="flex items-center gap-2">
    <label class="text-sm text-gray-400">Mes:</label>
    <select id="mes-sel" class="bg-gray-800 text-gray-200 border border-gray-700 rounded px-2 py-1 text-sm">
      <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
      <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
      <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
      <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
    </select>
    <label class="text-sm text-gray-400">Año:</label>
    <input type="number" id="anio-sel" class="bg-gray-800 text-gray-200 border border-gray-700 rounded px-2 py-1 text-sm w-20" value="2026">
    <button class="btn" onclick="cargar()">Ver</button>
  </div>
</div>

<!-- Resumen mensual -->
<div class="card p-4 mb-6">
  <h2 class="text-lg font-semibold mb-4">Resumen del Mes</h2>
  <div class="overflow-x-auto">
    <table id="tabla-mes">
      <thead><tr><th>Cliente</th><th>Otros</th><th>Fiado</th><th>M/P</th><th>Pago</th><th>Total mov.</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Detalle por cliente -->
<div class="card p-4 mb-6">
  <h2 class="text-lg font-semibold mb-4">Detalle por Cliente y Día</h2>
  <div class="overflow-x-auto">
    <table id="tabla-detalle">
      <thead><tr><th>Cliente</th><th>Fecha</th><th>Día</th><th>Otros</th><th>Fiado</th><th>M/P</th><th>Pago</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Cierres guardados -->
<div class="card p-4 mb-6">
  <h2 class="text-lg font-semibold mb-4">Cierres de Mes Guardados</h2>
  <button class="btn mb-3" onclick="cerrarMes()">📌 Cerrar mes actual</button>
  <div id="cierres-list"></div>
</div>

<script>
const mesesNombres = ["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const hoy = new Date();

// Set defaults
document.getElementById('mes-sel').value = hoy.getMonth() + 1;
document.getElementById('anio-sel').value = hoy.getFullYear();

async function cargar() {
  const mes = document.getElementById('mes-sel').value;
  const anio = document.getElementById('anio-sel').value;
  const r = await fetch(`/api/resumen/mes/${anio}/${mes}`);
  const data = await r.json();

  // Tabla resumen
  const resumen = {};
  data.forEach(r => {
    if (!resumen[r.id]) resumen[r.id] = {nombre: r.nombre, otros: 0, fiado: 0, mp: 0, pago: 0};
    if (r.valor) resumen[r.id][r.tipo]++;
  });

  const tbodyMes = document.querySelector('#tabla-mes tbody');
  tbodyMes.innerHTML = '';
  Object.values(resumen).forEach(c => {
    const total = c.otros + c.fiado + c.mp + c.pago;
    tbodyMes.innerHTML += `<tr>
      <td>${c.nombre}</td>
      <td class="text-center">${c.otros}</td>
      <td class="text-center text-red-400">${c.fiado}</td>
      <td class="text-center text-yellow-400">${c.mp}</td>
      <td class="text-center text-green-400">${c.pago}</td>
      <td class="text-center font-bold">${total}</td>
    </tr>`;
  });

  // Tabla detalle
  const tbodyDet = document.querySelector('#tabla-detalle tbody');
  tbodyDet.innerHTML = '';
  data.forEach(r => {
    const fecha = new Date(r.fecha + 'T00:00:00').toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit'});
    tbodyDet.innerHTML += `<tr>
      <td>${r.nombre}</td>
      <td>${fecha}</td>
      <td>${r.dia_semana}</td>
      <td>${r.tipo === 'otros' ? r.valor : ''}</td>
      <td>${r.tipo === 'fiado' ? r.valor : ''}</td>
      <td>${r.tipo === 'mp' ? r.valor : ''}</td>
      <td>${r.tipo === 'pago' ? r.valor : ''}</td>
    </tr>`;
  });

  // Cierres
  await cargarCierres();
}

async function cargarCierres() {
  const mes = document.getElementById('mes-sel').value;
  const anio = document.getElementById('anio-sel').value;
  const r = await fetch(`/api/cierres?anio=${anio}&mes=${mes}`);
  const cierres = await r.json();
  const div = document.getElementById('cierres-list');
  if (cierres.length === 0) {
    div.innerHTML = '<p class="text-gray-500 text-sm">No hay cierres guardados para este mes.</p>';
    return;
  }
  div.innerHTML = '<table class="w-full"><thead><tr><th>Cliente</th><th>Resumen</th><th>Fecha cierre</th></tr></thead><tbody>' +
    cierres.map(c => `<tr><td>${c.cliente_id}</td><td>${c.resumen}</td><td>${c.fecha_cierre}</td></tr>`).join('') +
    '</tbody></table>';
}

async function cerrarMes() {
  const mes = document.getElementById('mes-sel').value;
  const anio = document.getElementById('anio-sel').value;
  if (!confirm(`¿Cerrar el mes ${mesesNombres[parseInt(mes)]} ${anio}?`)) return;
  const r = await fetch(`/api/cierre/mes/${anio}/${mes}`, {method:'POST'});
  const data = await r.json();
  alert(`Cierre guardado: ${data.clientes} clientes`);
  cargarCierres();
}

cargar();
</script>
</body>
</html>
